name: Release 🚀

on:
  push:
    tags:
      - 'v*' # 只在版本标签推送时触发 🔔
  workflow_dispatch: # 允许手动触发工作流
    inputs:
      tag:
        description: '发布的版本号'
        required: true
        default: 'v1.0.0' # 默认的版本号

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码 📥
        uses: actions/checkout@v2

      - name: 设置 JDK 版本 ☕
        uses: actions/setup-java@v2
        with:
          java-version: '11' # 设置所需的 Java 版本（Minecraft通常使用Java 11）
          distribution: 'temurin'

      - name: 构建 Maven 包 🔧
        run: mvn -B package --file pom.xml

      - name: 发布版本 📝
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: '${{ github.event.inputs.tag || github.ref_name }}'
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传插件 JAR 📦
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 更新 bbs.mc9y.net 资源 🌐
        if: ${{ github.event.inputs.tag || startsWith(github.ref, 'refs/tags/') }}
        env:
          MC9Y_USERNAME: ${{ secrets.MC9Y_USERNAME }}
          MC9Y_PASSWORD: ${{ secrets.MC9Y_PASSWORD }}
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          # 获取上一个 tag 到当前 tag 的 git log 作为更新内容
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -10)
          fi
          TITLE="${VERSION}"
          MESSAGE=$(printf "[SIZE=4][B]XinxinWhiteList v%s[/B][/SIZE]\n\n[SIZE=3]更新内容:[/SIZE]\n%s\n\n详细更新内容请查看 GitHub Release:\nhttps://github.com/haishen668/XinxinWhiteList/releases/tag/v%s" "$VERSION" "$CHANGELOG" "$VERSION")
          JAR_FILE=$(ls target/*.jar 2>/dev/null | head -1)
          chmod +x scripts/update-mc9y.sh
          bash scripts/update-mc9y.sh "$VERSION" "$TITLE" "$MESSAGE" "$JAR_FILE"
